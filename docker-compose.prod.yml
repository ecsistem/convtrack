# ════════════════════════════════════════════════════════════════════════════
#  ConvTrack — produção via imagens do Docker Hub (sem build no servidor).
#
#  No servidor só precisa de 3 arquivos:
#    docker-compose.prod.yml · Caddyfile.prod · .env
#
#  Subir:   docker compose -f docker-compose.prod.yml --env-file .env pull
#           docker compose -f docker-compose.prod.yml --env-file .env up -d
# ════════════════════════════════════════════════════════════════════════════
services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       convtrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d convtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API + cloaker (imagem do Docker Hub) ──────────────────────────────────
  api:
    image: ${DOCKERHUB_USER}/convtrack-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL:         ${DATABASE_URL}
      REDIS_ADDR:           ${REDIS_ADDR:-redis:6379}
      PORT:                 "8080"
      JWT_SECRET:           ${JWT_SECRET}
      ENCRYPTION_KEY:       ${ENCRYPTION_KEY}
      FRONTEND_ORIGIN:      ${FRONTEND_ORIGIN}
      API_BASE_URL:         ${API_BASE_URL}
      SMTP_HOST:            ${SMTP_HOST:-}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
      SMTP_FROM:            ${SMTP_FROM:-}
      APP_NAME:             ${APP_NAME:-ConvTrack}
      S3_ENDPOINT:          ${S3_ENDPOINT:-}
      S3_REGION:            ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID:     ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_DEFAULT_BUCKET:    ${S3_DEFAULT_BUCKET:-convtrack-replays}
      HOTMART_HOTTOK:       ${HOTMART_HOTTOK:-}
      KIWIFY_WEBHOOK_SECRET: ${KIWIFY_WEBHOOK_SECRET:-}
      RETENTION_DAYS:           ${RETENTION_DAYS:-90}
      RETENTION_INTERVAL_HOURS: ${RETENTION_INTERVAL_HOURS:-6}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Dashboard / frontend (imagem do Docker Hub) ───────────────────────────
  web:
    image: ${DOCKERHUB_USER}/convtrack-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      api: { condition: service_healthy }

  # ── Caddy — TLS automático + roteia os dois domínios + cloaking ───────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_DOMAIN:   ${CADDY_DOMAIN}
      FRONTEND_DOMAIN: ${FRONTEND_ORIGIN}
      CADDY_EMAIL:    ${CADDY_EMAIL:-ssl@example.com}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
