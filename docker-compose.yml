services:

  # ── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       convtrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d convtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Cache / filas ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Caddy — reverse proxy + On-Demand TLS para domínios de clientes ─────────
  # Em desenvolvimento: comente ou remova este serviço (acesse a API na porta 8080).
  # Em produção: exponha apenas as portas 80/443; remova "8080:8080" do serviço api.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3 (QUIC)
    environment:
      # Domínio principal da API — Caddy emite cert estático para ele
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      # E-mail para notificações Let's Encrypt
      CADDY_EMAIL:  ${CADDY_EMAIL:-ssl@convtrack.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certs Let's Encrypt (persistidos)
      - caddy_config:/config    # estado interno do Caddy
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── API + migrator automático ─────────────────────────────────────────────
  # As migrations são embutidas no binário (go:embed).
  # Na inicialização, o app detecta e aplica automaticamente todas as pendentes.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Em produção com Caddy: remova esta linha — API só é acessível internamente.
      # Em desenvolvimento sem Caddy: mantenha para acesso direto.
      - "8080:8080"
    environment:
      # ── Banco ──────────────────────────────────────────────────────
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/convtrack?sslmode=disable

      # ── Redis ──────────────────────────────────────────────────────
      REDIS_ADDR: redis:6379

      # ── Servidor ───────────────────────────────────────────────────
      PORT: 8080

      # ── Auth ───────────────────────────────────────────────────────
      # Em produção: gere com `openssl rand -base64 32`
      JWT_SECRET:      ${JWT_SECRET:-cty2Q8OYqKOudFx2EaK2C77wV8ADvTKyVF4tt6ybfKc=}
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY:-NWtxjfFwUKLvxId747p6Qx2w4Ycvy5FpQZ+Dt4EmJJM=}

      # ── CORS ───────────────────────────────────────────────────────
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}

      # ── Shield — URL pública desta API (para injeção de script no proxy reverso)
      # Em produção: https://api.seudominio.com
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}

      # ── S3 para session replay (opcional) ─────────────────────────
      S3_ENDPOINT:          ${S3_ENDPOINT:-}
      S3_REGION:            ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID:     ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_DEFAULT_BUCKET:    ${S3_DEFAULT_BUCKET:-convtrack-replays}

      # ── DEV: redireciona CAPIs para inspeção (remova em produção) ──
      DEV_WEBHOOK_URL: ${DEV_WEBHOOK_URL:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      # Assets públicos em modo dev (hot-reload de tracker.js/shield-fp.js)
      - ./public:/app/public

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend Next.js ──────────────────────────────────────────────────────
  web:
    build:
      context: ../convtrack-web
      dockerfile: Dockerfile
      args:
        # URL que o browser usa para chamar a API (deve ser acessível externamente)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  caddy_data:     # certs Let's Encrypt — NUNCA apague em produção
  caddy_config:   # estado interno do Caddy
